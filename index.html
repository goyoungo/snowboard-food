<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스노우보드 맛집</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>🏂 스노우보드 맛집</h1>
    <p class="subtitle">보더들을 위한 맛집 리스트</p>
  </header>

  <main class="container">
    <section class="filters" aria-label="필터">
      <input id="qName" type="text" placeholder="가게명 검색" />
      <input id="qMenu" type="text" placeholder="메뉴/기타 검색" />
      <input id="qAddress" type="text" placeholder="주소 검색" />
      <select id="scoreFilter">
        <option value="">추-비추 전체</option>
        <option value="pos">0 이상</option>
        <option value="neg">음수만</option>
      </select>
      <button id="btnReset" type="button">초기화</button>
    </section>

    <section id="status" class="status" aria-live="polite"></section>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Menu 및 기타</th>
            <th>Address</th>
            <th>Number</th>
            <th>추천자</th>
            <th>비추천자</th>
            <th>추-비추</th>
            <th>메모</th>
            <th>영업 시간</th>
            <th>지도</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <footer class="footer">
    <small>Made for riders · 공개 정보만 제공</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
